<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Afini Ubaidah Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    .admin-wrap { max-width: 900px; margin: 0 auto; padding: 2rem 1.7rem 4rem 1.5rem; position: relative; z-index: 1; }
    .login-box { max-width: 400px; margin: 15vh auto 0; border: 1px solid var(--border); padding: 2.5rem 2.3rem 2.3rem 2.2rem; background: var(--surface); }
    .login-title { font-family: var(--sans); font-size: 1.4rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); margin-bottom: 0.4rem; }
    .login-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 2rem; }
    .admin-header { display: flex; justify-content: space-between; align-items: flex-end; padding: 1.5rem 0 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .admin-title { font-family: var(--sans); font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); }
    .admin-title span { color: var(--accent); }
    .admin-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
    .logout-btn { font-family: var(--sans); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); background: none; border: 1px solid var(--border); padding: 0.4rem 0.9rem; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { color: var(--accent); border-color: var(--accent); }
    .section-block { margin-bottom: 3.5rem; }
    .block-title { font-family: var(--sans); font-size: 0.7rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.6rem; }
    .block-title::before { content: ''; display: inline-block; width: 18px; height: 1px; background: var(--accent); }
    .add-project-form { border: 1px solid var(--border); padding: 2rem 2rem 1.8rem 2.1rem; background: var(--surface); margin-bottom: 1px; }
    .projects-table { border: 1px solid var(--border); width: 100%; }
    .pt-header { display: grid; grid-template-columns: 1fr 1fr 0.6fr auto; gap: 1rem; padding: 0.8rem 1.2rem; background: var(--surface); border-bottom: 1px solid var(--border); font-family: var(--sans); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .pt-row { display: grid; grid-template-columns: 1fr 1fr 0.6fr auto; gap: 1rem; padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; }
    .pt-row:last-child { border-bottom: none; }
    .pt-row:hover { background: var(--surface); }
    .pt-name { font-size: 0.88rem; color: var(--text); font-weight: 500; }
    .pt-type { font-size: 0.75rem; color: var(--muted); }
    .pt-url { font-size: 0.75rem; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .del-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.6rem; cursor: pointer; font-size: 0.72rem; font-family: var(--sans); letter-spacing: 0.06em; transition: all 0.15s; white-space: nowrap; }
    .del-btn:hover { border-color: #e55; color: #e55; }
    .no-data { padding: 2.5rem; text-align: center; color: var(--muted); font-size: 0.82rem; background: var(--bg); }
    .reviews-admin { border: 1px solid var(--border); }
    .ra-row { display: grid; grid-template-columns: 1fr 0.3fr 0.5fr auto; gap: 1rem; padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); align-items: start; }
    .ra-row:last-child { border-bottom: none; }
    .ra-row:hover { background: var(--surface); }
    .ra-name { font-size: 0.88rem; color: var(--text); font-weight: 500; }
    .ra-text { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.5; }
    .ra-stars { font-size: 0.8rem; color: var(--accent); }
    .ra-date { font-size: 0.72rem; color: var(--muted); }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 3rem; }
    .stat-box { background: var(--surface); padding: 1.5rem 1.3rem; }
    .stat-box-num { font-family: var(--sans); font-size: 2rem; font-weight: 700; color: var(--accent); letter-spacing: -0.03em; }
    .stat-box-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.25rem; }
    .back-link { font-family: var(--sans); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: color 0.2s; }
    .back-link:hover { color: var(--text); }
    .back-link svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    #login-screen { display: block; }
    #admin-screen { display: none; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div style="position:relative;z-index:1;">
    <div class="login-box">
      <div class="login-title">Admin<span style="color:var(--accent)">.</span></div>
      <div class="login-sub">Afini Ubaidah &mdash; Portfolio Admin Panel</div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="login-pass" class="form-input" type="password" placeholder="Enter admin password"/>
      </div>
      <div id="login-error" style="font-size:0.78rem;color:#e55;margin-bottom:1rem;display:none;">Incorrect password. Try again.</div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Login
      </button>
      <div style="margin-top:1.5rem;text-align:center;">
        <a href="../index.html" style="font-size:0.75rem;color:var(--muted);text-decoration:none;">
          &larr; Back to Portfolio
        </a>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="admin-screen">
  <div class="admin-wrap">

    <!-- HEADER -->
    <div class="admin-header">
      <div>
        <div class="admin-title">Admin<span>.</span></div>
        <div class="admin-sub">Afini Ubaidah &mdash; AM2408016800 &mdash; Portfolio Management</div>
      </div>
      <div style="display:flex;gap:1rem;align-items:center;">
        <a href="../index.html" class="back-link">
          <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
          View Portfolio
        </a>
        <button class="logout-btn" id="logout-btn">Logout</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-box-num" id="stat-projects">0</div>
        <div class="stat-box-label">Projects Added</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-num" id="stat-reviews">0</div>
        <div class="stat-box-label">Reviews Received</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-num" id="stat-avg">—</div>
        <div class="stat-box-label">Avg. Rating</div>
      </div>
    </div>

    <!-- ADD PROJECT -->
    <div class="section-block">
      <div class="block-title">Add New Project</div>
      <div class="add-project-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Project Name</label>
            <input id="p-name" class="form-input" type="text" placeholder="e.g. Portfolio Website"/>
          </div>
          <div class="form-group">
            <label class="form-label">Type / Category</label>
            <input id="p-type" class="form-input" type="text" placeholder="e.g. Web App, Mobile, Cloud"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="p-desc" class="form-textarea" placeholder="Brief description of the project..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Project URL (optional)</label>
          <input id="p-url" class="form-input" type="url" placeholder="https://yourproject.netlify.app"/>
        </div>
        <button class="btn btn-primary" id="add-project-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Project
        </button>
      </div>

      <!-- PROJECTS TABLE -->
      <div class="block-title" style="margin-top:2rem;">Manage Projects</div>
      <div class="projects-table">
        <div class="pt-header"><span>Name</span><span>Description</span><span>Type</span><span>Action</span></div>
        <div id="projects-table-body"></div>
      </div>
    </div>

    <!-- MANAGE REVIEWS -->
    <div class="section-block">
      <div class="block-title">Manage Reviews</div>
      <div class="reviews-admin" id="reviews-admin-list"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
  // ── CONFIG ─────────────────────────────────────
  const ADMIN_PASSWORD = 'afini2025'; // change this!

  // ── TOAST ──────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── LOGIN ──────────────────────────────────────
  function checkSession() {
    if (sessionStorage.getItem('afini_admin') === 'true') showAdmin();
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadProjects();
    loadReviewsAdmin();
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    const pass = document.getElementById('login-pass').value;
    if (pass === ADMIN_PASSWORD) {
      sessionStorage.setItem('afini_admin', 'true');
      document.getElementById('login-error').style.display = 'none';
      showAdmin();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  });

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem('afini_admin');
    document.getElementById('login-screen').style.display = 'block';
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-pass').value = '';
  });

  checkSession();

  // ── PROJECTS ────────────────────────────────────
  function getProjects() { return JSON.parse(localStorage.getItem('afini_projects') || '[]'); }
  function saveProjects(p) { localStorage.setItem('afini_projects', JSON.stringify(p)); }

  function loadProjects() {
    const projects = getProjects();
    document.getElementById('stat-projects').textContent = projects.length;
    const body = document.getElementById('projects-table-body');
    if (!projects.length) {
      body.innerHTML = `<div class="no-data">No projects yet — add one above</div>`;
      return;
    }
    body.innerHTML = projects.map((p, i) => `
      <div class="pt-row">
        <div class="pt-name">${p.name}</div>
        <div class="pt-type" style="font-size:0.78rem;color:var(--muted);">${p.desc.substring(0,50)}${p.desc.length>50?'...':''}</div>
        <div class="pt-type">${p.type}</div>
        <button class="del-btn" onclick="deleteProject(${i})">Delete</button>
      </div>
    `).join('');
  }

  document.getElementById('add-project-btn').addEventListener('click', () => {
    const name = document.getElementById('p-name').value.trim();
    const type = document.getElementById('p-type').value.trim();
    const desc = document.getElementById('p-desc').value.trim();
    const url  = document.getElementById('p-url').value.trim();
    if (!name) return showToast('Project name is required');
    if (!desc) return showToast('Description is required');
    const projects = getProjects();
    projects.unshift({ name, type: type || 'Project', desc, url, date: new Date().toLocaleDateString('en-MY') });
    saveProjects(projects);
    document.getElementById('p-name').value = '';
    document.getElementById('p-type').value = '';
    document.getElementById('p-desc').value = '';
    document.getElementById('p-url').value  = '';
    loadProjects();
    showToast('Project added ✓');
  });

  function deleteProject(i) {
    if (!confirm('Delete this project?')) return;
    const projects = getProjects();
    projects.splice(i, 1);
    saveProjects(projects);
    loadProjects();
    showToast('Project deleted');
  }

  // ── REVIEWS ADMIN ───────────────────────────────
  function loadReviewsAdmin() {
    try {
      db.collection('reviews').orderBy('timestamp', 'desc').onSnapshot(snap => {
        const reviews = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        document.getElementById('stat-reviews').textContent = reviews.length;
        const avg = reviews.length ? (reviews.reduce((s,r) => s + r.stars, 0) / reviews.length).toFixed(1) : '—';
        document.getElementById('stat-avg').textContent = avg;
        const list = document.getElementById('reviews-admin-list');
        if (!reviews.length) {
          list.innerHTML = `<div class="no-data">No reviews yet</div>`;
          return;
        }
        list.innerHTML = `
          <div class="pt-header" style="grid-template-columns:1fr 0.3fr 0.6fr auto;">
            <span>Review</span><span>Stars</span><span>Date</span><span>Action</span>
          </div>` +
          reviews.map(r => `
            <div class="ra-row" style="grid-template-columns:1fr 0.3fr 0.6fr auto;">
              <div><div class="ra-name">${r.name}</div><div class="ra-text">${r.text}</div></div>
              <div class="ra-stars">${'★'.repeat(r.stars)}</div>
              <div class="ra-date">${r.date || ''}</div>
              <button class="del-btn" onclick="deleteReview('${r.id}')">Delete</button>
            </div>
          `).join('');
      });
    } catch(e) {
      document.getElementById('reviews-admin-list').innerHTML = `<div class="no-data">Firebase not configured yet</div>`;
    }
  }

  async function deleteReview(id) {
    if (!confirm('Delete this review?')) return;
    try {
      await db.collection('reviews').doc(id).delete();
      showToast('Review deleted');
    } catch(e) {
      showToast('Error deleting review');
    }
  }
</script>
</body>
</html>
